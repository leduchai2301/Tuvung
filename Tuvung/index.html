<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vocabulary App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-4 text-primary fw-bold">Học Từ Vựng với AI</h1>

    <!-- 1. Khu vực Xác thực (Đăng nhập / Đăng ký) -->
    <div id="auth-section" class="card shadow-sm p-4 mb-4 mx-auto" style="max-width: 450px;">
        <ul class="nav nav-pills nav-justified mb-3" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">Đăng nhập</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button">Đăng ký</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Form Đăng nhập -->
            <div class="tab-pane fade show active" id="pills-login">
                <div class="mb-3">
                    <input type="email" id="login-email" class="form-control" placeholder="Email của bạn">
                </div>
                <div class="mb-3">
                    <input type="password" id="login-password" class="form-control" placeholder="Mật khẩu">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">Vào hệ thống</button>
            </div>

            <!-- Form Đăng ký -->
            <div class="tab-pane fade" id="pills-register">
                <div class="mb-3">
                    <input type="email" id="reg-email" class="form-control" placeholder="Email mới">
                </div>
                <div class="mb-3">
                    <input type="password" id="reg-password" class="form-control" placeholder="Mật khẩu mới">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">Mục tiêu điểm số (IELTS/TOEIC)</label>
                    <input type="number" id="reg-target" class="form-control" value="500">
                </div>
                <button onclick="register()" class="btn btn-success w-100">Tạo tài khoản ngay</button>
            </div>
        </div>
    </div>

    <!-- 2. Khu vực App chính (Mặc định ẩn) -->
    <div id="main-app" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>Chào mừng <span id="user-display" class="text-primary"></span>!</h4>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">Đăng xuất</button>
        </div>

        <div class="input-group mb-4 shadow-sm">
            <input type="text" id="search-input" class="form-control form-control-lg" placeholder="Nhập từ tiếng Anh cần tra...">
            <button onclick="searchWord()" class="btn btn-success px-4">Tra từ AI</button>
        </div>

        <!-- Nơi hiển thị kết quả tìm kiếm -->
        <div id="search-result"></div>

        <hr class="my-5">
        <h3 class="mb-4">📚 Sổ tay từ vựng của tôi</h3>
        <div id="saved-list" class="row g-3">
            <!-- Từ đã lưu sẽ hiện ở đây -->
        </div>
    </div>
    <div class="row mb-5">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-primary text-white p-4 text-center">
            <h3>🧠 Thử Thách Ôn Tập</h3>
            <p>Kiểm tra trí nhớ với các từ vựng bạn đã lưu!</p>
            <div id="quiz-container" class="mt-3">
                <button onclick="startQuiz()" class="btn btn-light fw-bold text-primary px-4">Bắt đầu Ôn tập ngay</button>
            </div>
        </div>
    </div>
</div>
</div>


<!-- Bootstrap JS (Cần thiết để chuyển Tab) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
